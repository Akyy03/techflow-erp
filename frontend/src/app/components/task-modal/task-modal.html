<div class="modal-overlay" (click)="close()">
  <div class="bento-card modal-content" (click)="$event.stopPropagation()">
    <div style="text-align: center; margin-bottom: 30px">
      <h2
        style="color: white; margin: 0; font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px"
      >
        {{ taskModel.id ? 'UPDATE' : 'PROVISION' }} <span style="color: #6366f1">TASK</span>
      </h2>
      <div style="margin-top: 8px">
        <span class="project-id">ID_PRJ_0{{ projectId }}</span>
      </div>
    </div>

    <div class="modal-body">
      <div style="margin-bottom: 24px">
        <label class="tf-label">Task Identity <span style="color: #6366f1">*</span></label>
        <input
          type="text"
          name="title"
          [(ngModel)]="taskModel.title"
          class="tf-input"
          style="width: 100%; margin-top: 8px"
          placeholder="e.g. Implement JWT Auth"
        />
      </div>

      <div style="display: flex; gap: 20px; margin-bottom: 24px">
        <div style="flex: 1">
          <label class="tf-label">Release Deadline <span style="color: #6366f1">*</span></label>
          <input
            type="date"
            name="deadline"
            [(ngModel)]="taskModel.deadline"
            [min]="today"
            class="tf-input"
            style="width: 100%; margin-top: 8px"
          />
        </div>

        <div style="flex: 1">
          <label class="tf-label">Operational Lead <span style="color: #6366f1">*</span></label>
          <select
            name="assignee"
            [(ngModel)]="taskModel.assignedToId"
            class="tf-input"
            style="width: 100%; margin-top: 8px"
          >
            <option [value]="null">Select employee...</option>
            <option *ngFor="let user of users" [value]="user.id">
              {{ user.firstName }} {{ user.lastName }}
            </option>
          </select>

          <div
            *ngIf="users.length === 0"
            style="margin-top: 8px; color: #fb7185; font-size: 0.75rem; line-height: 1.2"
          >
            ⚠️ No members available. Please add the relevant departments to the project first.
          </div>
        </div>
      </div>

      <div style="margin-bottom: 32px">
        <label class="tf-label">Operational Description</label>
        <textarea
          name="description"
          [(ngModel)]="taskModel.description"
          class="tf-input"
          rows="4"
          style="width: 100%; margin-top: 8px; resize: none"
          placeholder="Core requirements and technical specs..."
        ></textarea>
      </div>
    </div>

    <div style="display: flex; gap: 12px">
      <button type="button" (click)="close()" class="tf-btn-secondary" style="flex: 1">
        Abort
      </button>

      <button
        type="button"
        (click)="submit()"
        [disabled]="!isFormValid"
        class="tf-btn-primary"
        style="flex: 2"
        [style.opacity]="isFormValid ? '1' : '0.4'"
        [style.cursor]="isFormValid ? 'pointer' : 'not-allowed'"
      >
        {{ taskModel.id ? 'Save Changes' : 'Finalize Initialization' }}
      </button>
    </div>
  </div>
</div>
